<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personality Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">

</head>

<body>

<h1 class="text-center mt-4">What Superhero Are You?</h1>

<!-- Question 1 -->
<div class="container d-flex justify-content-center" id="question-1">
<div class="card my-4 p-4 question-block" style="width:75%;">
<h4>What would you do in a dangerous situation?</h4>

<div class="row g-2">

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Fight the enemy</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Think of a smart plan</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Run away</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Call for help</button>
</div>

</div>
</div>
</div>


<!-- Question 2 -->
<div class="container d-flex justify-content-center" id="question-2">
<div class="card my-4 p-4 question-block" style="width:75%;">
<h4>What power would you want?</h4>

<div class="row g-2">

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Super Strength</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Super Intelligence</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Super Speed</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Invisibility</button>
</div>

</div>
</div>
</div>


<!-- Question 3 -->
<div class="container d-flex justify-content-center" id="question-3">
<div class="card my-4 p-4 question-block" style="width:75%;">
<h4>What is your best skill?</h4>

<div class="row g-2">

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Fast</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Enthusiastic</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Loyal</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Brave</button>
</div>

</div>
</div>
</div>


<!-- Question 4 -->
<div class="container d-flex justify-content-center" id="question-4">
<div class="card my-4 p-4 question-block" style="width:75%;">
<h4>Which one is your favorite superhero?</h4>

<div class="row g-2">

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Spider-Man</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Superman</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">The Flash</button>
</div>

<div class="col-6">
<button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Thor</button>
</div>

</div>
</div>
</div>


<div class="container d-flex justify-content-center">
<button id="show-result" class="btn btn-success my-4">Show Results</button>
</div>


<div class="container d-flex justify-content-center">
<div id="result-container" class="card p-4 mb-4" style="width:75%; display:none;">
<h3>Your Result:</h3>
<p id="result-text"></p>
</div>
</div>


<script src="./js/script.js"></script>

</body>
</html>
